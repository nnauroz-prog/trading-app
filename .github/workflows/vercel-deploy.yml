name: Trigger Vercel Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel Deploy Hook
        run: |
          curl -X POST -f -s -S \
            "https://api.vercel.com/v1/integrations/deploy/prj_Q8rpeuw68C5mjAurkC6Xnt020zrG/ViNa7YDsMf" \
            && echo "Vercel deploy triggered"
